<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShieldHer – Submit Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="./output.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-950 text-gray-200 h-screen flex">

<!-- SIDEBAR (unchanged) -->
<aside class="w-64 min-w-[16rem] bg-gray-900 border-r border-gray-800 p-5 flex flex-col">
  <div class="flex items-center gap-3 mb-7">
    <i class="fa-solid fa-shield-halved text-blue-700 text-3xl mb-8"></i>
    <h1 class="text-2xl font-bold text-white mb-8">Shield<span class="text-blue-700">Her</span></h1>
  </div>
  <nav class="flex-1 space-y-3 text-gray-300">
    <a href="dashboard.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Dashboard</a>
    <a href="Emergency Alert.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Emergency Alert</a>
    <a href="DetectionGuide.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Detection Guide</a>
    <a href="WifiScanner.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">WiFi Scanner</a>
    <a href="SafetyChecklist.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Safety Checklist</a>
    <a href="SubmitReport.html" class="block px-3 py-2 rounded-lg bg-gray-800 text-white">Submit Report</a>
    <a href="DetectionMap.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Detection Map</a>
    <a href="ScanHistory.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Scan History</a>
    <a href="Alerts.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Alerts</a>
    <a href="Settings.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Settings</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-10 overflow-y-auto">
  <h2 class="text-3xl font-bold text-white mb-6">
    <i class="fa-solid fa-file-circle-exclamation text-blue-600"></i>
    Submit Detection Report
  </h2>

  <div class="max-w-3xl bg-gray-900 border border-gray-800 rounded-2xl p-8 space-y-6">

    <input id="location" type="text"
      placeholder="Location details"
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3" />

    <select id="type"
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3">
      <option>Hidden Camera</option>
      <option>Suspicious WiFi Device</option>
      <option>Audio Recording Device</option>
      <option>Other</option>
    </select>

    <textarea id="description" rows="4"
      placeholder="Description"
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3"></textarea>

    <input id="contact" type="email"
      placeholder="Email (optional)"
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3" />

    <label class="flex items-center gap-2 text-gray-300">
      <input id="anonymous" type="checkbox" class="accent-blue-600">
      Report anonymously
    </label>

    <button onclick="submitReport()"
      class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold">
      Submit Report
    </button>

  </div>
</main>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCw3kr1M6ZYBFzRH8w18BE0S7DV8-rkGTY",
    authDomain: "shieldher-14107.firebaseapp.com",
    databaseURL: "https://shieldher-14107-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "shieldher-14107",
    storageBucket: "shieldher-14107.firebasestorage.app",
    messagingSenderId: "1085993060746",
    appId: "1:1085993060746:web:81cf85d4fb642ad7ae6073"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function submitReport() {
    const location = document.getElementById("location").value;
    const type = document.getElementById("type").value;
    const description = document.getElementById("description").value;
    const contact = document.getElementById("contact").value;
    const anonymous = document.getElementById("anonymous").checked;

    if (!location) {
      alert("Please enter location details");
      return;
    }

    const report = {
      location: location,
      type: type,
      description: description,
      contact: anonymous ? "Anonymous" : contact || "N/A",
      anonymous: anonymous,
      time: new Date().toLocaleString(),
      status: "unsafe"
    };

    // Push to Firebase
    db.ref("reports").push(report, (error) => {
      if (error) {
        alert("Error submitting report: " + error);
      } else {
        alert("Report submitted successfully!");
        window.location.href = "dashboard.html";
      }
    });
  }
</script>
</body>
</html>
