<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldHer – Alerts</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-950 text-gray-200 h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 min-w-[16rem] bg-gray-900 border-r border-gray-800 p-5 flex flex-col">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-7">
      <i class="fa-solid fa-shield-halved text-blue-700 text-3xl mb-8"></i>
      <h1 class="text-2xl font-bold text-white mb-8">Shield<span class="text-blue-700">Her</span></h1>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-3 text-gray-300">
      <a href="dashboard.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Dashboard</a>
      <a href="Emergency Alert.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Emergency Alert</a>
      <a href="DetectionGuide.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Detection Guide</a>
      <a href="WifiScanner.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">WiFi Scanner</a>
      <a href="SafetyChecklist.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Safety Checklist</a>
      <a href="SubmitReport.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Submit Report</a>
      <a href="DetectionMap.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Detection Map</a>
      <a href="ScanHistory.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Scan History</a>
      <a href="Alerts.html" class="block px-3 py-2 rounded-lg bg-gray-800 text-white">Alerts</a>
      <a href="Settings.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Settings</a>
    </nav>

    <div class="mt-6 text-sm text-gray-400">
      Logged in as <span class="text-white">john</span>
      <a href="index.html">
        <button class="block mt-3 text-red-400 hover:text-red-300">Sign Out</button>
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto p-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
      <div>
        <h2 class="text-3xl font-bold text-white">Alerts</h2>
        <p class="text-gray-400">Stay informed about detections and community warnings</p>
      </div>
      <button id="newAlertBtn" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm flex items-center gap-2">
        <i class="fa-solid fa-bell"></i> New Alert
      </button>
    </div>

    <!-- Alert Cards -->
    <div id="alertsContainer" class="space-y-4"></div>

  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCw3kr1M6ZYBFzRH8w18BE0S7DV8-rkGTY",
      authDomain: "shieldher-14107.firebaseapp.com",
      databaseURL: "https://shieldher-14107-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shieldher-14107",
      storageBucket: "shieldher-14107.firebasestorage.app",
      messagingSenderId: "1085993060746",
      appId: "1:1085993060746:web:81cf85d4fb642ad7ae6073"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const alertsContainer = document.getElementById("alertsContainer");

    // Function to create alert cards
    function createAlertCard(alert) {
      const div = document.createElement("div");
      div.className = "flex justify-between items-start bg-gray-800 border border-white rounded-lg p-4 hover:shadow-md transition";

      const severityColor = alert.severity === "high" ? "text-red-700" :
                            alert.severity === "medium" ? "text-yellow-500" : "text-green-600";

      div.innerHTML = `
        <div>
          <h3 class="font-semibold ${severityColor}">${alert.title}</h3>
          <p class="text-gray-400 text-sm mt-1">${alert.message}</p>
          <div class="flex items-center text-gray-500 text-xs mt-2 gap-4">
            <span class="flex items-center gap-1">
              <i class="fa-solid fa-location-dot"></i> ${alert.location}
            </span>
            <span class="flex items-center gap-1">
              <i class="fa-solid fa-clock"></i> ${alert.time}
            </span>
          </div>
        </div>
        <button class="bg-gray-200 text-gray-900 px-3 py-1 rounded-md text-sm hover:bg-gray-300 transition">Mark Read</button>
      `;
      alertsContainer.prepend(div);
    }

    // Listen to Firebase for new alerts
    db.ref("alerts").on("child_added", snapshot => {
      const alert = snapshot.val();
      createAlertCard(alert);
    });

    // Optional: Add new alert manually for testing
    document.getElementById("newAlertBtn").addEventListener("click", () => {
      const newAlertRef = db.ref("alerts").push();
      const now = new Date();
      const alertData = {
        title: "Test Alert",
        message: "This is a new alert added at runtime!",
        location: "Test Location",
        time: now.toLocaleString(),
        severity: "high"
      };
      newAlertRef.set(alertData);
    });
  </script>
</body>
</html>
