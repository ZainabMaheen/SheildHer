<!DOCTYPE html>
<html lang="en" class="dark:bg-gray-900 dark:text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>
   <link href="./output.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900">
  <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-xl shadow-md p-8">
    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="flex justify-center items-center gap-2">
         <i class="fa-solid fa-shield-halved text-3xl text-blue-700"></i>
        <span class="text-xl font-semibold text-gray-800 dark:text-gray-100">ShieldHer</span>
      </div>
    </div>

    <h2 class="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">Log In</h2>
    <p class="text-center text-gray-500 dark:text-gray-400 mb-6">Welcome back! Please log in to your account.</p>

    <form id="loginForm" class="space-y-4">
      <div>
        <label for="email" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="password" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Password</label>
        <input type="password" id="password" name="password" placeholder="********" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition">
        Log In
      </button>
    </form>

    <!-- Back to Create Account -->
    <p class="text-center text-gray-600 dark:text-gray-400 text-sm mt-6">
      Don't have an account?
      <a href="signin.html" class="text-blue-600 dark:text-blue-400 font-medium hover:underline">Create one</a>
    </p>
  </div>
  <script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const storedUser = JSON.parse(localStorage.getItem("User"));

  if(storedUser && storedUser.email === email && storedUser.password === password){
      window.location.href = "dashboard.html";
  } else {
      alert("Invalid email or password");
  }
});
</script>
</body>
</html>
