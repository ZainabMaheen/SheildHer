<!DOCTYPE html>
<html lang="en" class="dark:bg-gray-900 dark:text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
   <link href="./output.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900">
  <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-xl shadow-md p-8">
    <!-- Logo and Title -->
    <div class="text-center mb-6">
      <div class="flex justify-center items-center gap-2">
        <div class=" text-4xl"><i class="fa-solid fa-shield-halved  text-blue-700"></i></div>
        <span class="text-xl font-semibold text-gray-800 dark:text-gray-100">ShieldHer</span>
      </div>
    </div>

    <h2 class="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">Create Account</h2>
    <p class="text-center text-gray-500 dark:text-gray-400 mb-6">
      Join EpiCare to start managing your epilepsy journey
    </p>

    <!-- Form -->
    <form id="signupForm" class="space-y-4">
      <div>
        <label for="fullname" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="John Doe" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="email" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="password" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Password</label>
        <input type="password" id="password" name="password" placeholder="********" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">At least 8 characters</p>
      </div>

      <div>
        <label for="confirmPassword" class="block text-gray-700 dark:text-gray-200 font-medium mb-1">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="********" required
          class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition">
        Create Account
      </button>
    </form>

    <!-- Sign In link -->
    <p class="text-center text-gray-600 dark:text-gray-400 text-sm mt-6">
      Already have an account?
      <a href="login.html" class="text-blue-600 dark:text-blue-400 font-medium hover:underline">Log In</a>
    </p>
  </div>
  <script>
document.getElementById("signupForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const fullname = document.getElementById("fullname").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  // Save user (demo purpose)
const user = {
  fullname: fullname,
  email: email,
  password: password
};

  localStorage.setItem("User", JSON.stringify(user));

  // Go to dashboard
  window.location.href = "dashboard.html";
});
</script>


</body>
</html>
