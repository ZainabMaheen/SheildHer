<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShieldHer – Detection Map</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="./output.css" rel="stylesheet">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-950 text-gray-200 h-screen flex">

  <!-- SIDEBAR -->
   
  <aside class="w-64 min-w-[16rem] bg-gray-900 border-r border-gray-800 p-5 flex flex-col">
    <div class="flex items-center gap-3 mb-7">
      <i class="fa-solid fa-shield-halved text-blue-700 text-3xl mb-8"></i>
      <h1 class="text-2xl font-bold text-white mb-8">Shield<span class="text-blue-700">Her</span></h1>
    </div>

    <nav class="flex-1 space-y-3 text-gray-300">
      <a href="dashboard.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Dashboard</a>
      <a href="Emergency Alert.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Emergency Alert</a>
      <a href="DetectionGuide.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Detection Guide</a>
      <a href="WifiScanner.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">WiFi Scanner</a>
      <a href="SafetyChecklist.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Safety Checklist</a>
      <a href="SubmitReport.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Submit Report</a>
      <a href="DetectionMap.html" class="block px-3 py-2 rounded-lg bg-gray-800 text-white">Detection Map</a>
      <a href="ScanHistory.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Scan History</a>
      <a href="Alerts.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Alerts</a>
      <a href="Settings.html" class="block px-3 py-2 rounded-lg hover:bg-gray-800">Settings</a>
    </nav>

    <div class="text-sm text-gray-400 mt-6">
      Logged in as <span class="text-white">john</span>
      <button class="block mt-3 text-red-400 hover:text-red-300">Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 h-full overflow-y-auto p-10">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-white flex items-center gap-2">
        <i class="fa-solid fa-location-dot text-blue-600"></i>
        Detection Map
      </h2>
      <p class="text-gray-400">
        View reported unsafe locations in your area
      </p>
    </div>

    <!-- Map -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl mb-8 overflow-hidden">
      <div id="map" class="w-full h-96"></div>
    </div>

    <!-- Report List -->
    <div class="space-y-4">
      <h3 class="text-lg font-semibold text-white mb-2">Reported Locations</h3>
      <div id="dynamicReports" class="space-y-4"></div>
      <p id="locationCount" class="text-gray-400 mt-2"></p>
    </div>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCw3kr1M6ZYBFzRH8w18BE0S7DV8-rkGTY",
      authDomain: "shieldher-14107.firebaseapp.com",
      databaseURL: "https://shieldher-14107-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shieldher-14107",
      storageBucket: "shieldher-14107.firebasestorage.app",
      messagingSenderId: "1085993060746",
      appId: "1:1085993060746:web:81cf85d4fb642ad7ae6073"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <!-- Google Maps -->
  <script>
    let map;
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 20.5937, lng: 78.9629 },
        zoom: 5,
        styles: [
          { elementType: "geometry", stylers: [{ color: "#1f2937" }] },
          { elementType: "labels.text.stroke", stylers: [{ color: "#111827" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] }
        ]
      });

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          map.setCenter(userLoc); map.setZoom(14);
          new google.maps.Marker({ position: userLoc, map, title:"You", icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png" });
        });
      }

      // Listen to Firebase for reports
      db.ref("reports").on("child_added", snapshot => {
        const report = snapshot.val();

        // Add marker if coordinates exist
        if(report.lat && report.lng){
          new google.maps.Marker({
            position: {lat: report.lat, lng: report.lng},
            map,
            title: report.location,
            icon: report.type.includes("WiFi") ? "https://maps.google.com/mapfiles/ms/icons/orange-dot.png" : "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
          });
        }

        // Add report to list
        const dynamicReports = document.getElementById("dynamicReports");
        const div = document.createElement("div");
        div.className = "bg-gray-900 rounded-2xl p-4 border border-gray-800";
        div.innerHTML = `
          <p><strong>Location:</strong> ${report.location}</p>
          <p><strong>Type:</strong> ${report.type}</p>
          <p><strong>Description:</strong> ${report.description || "N/A"}</p>
          <p><strong>Time:</strong> ${report.time}</p>
        `;
        dynamicReports.prepend(div);

        // Update count
        document.getElementById("locationCount").innerText = `Total Reports: ${dynamicReports.children.length}`;
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCaUt4Ydc2WqTtz23VfVor6_7-jH_V3V3U&callback=initMap" async defer></script>
</body>
</html>
